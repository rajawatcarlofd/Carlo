<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Multi-Account Broadcaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container-fluid">
        <nav class="navbar navbar-dark bg-dark mb-4">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">📱 Telegram Broadcaster</span>
                <span class="navbar-text text-light" id="status-badge">Status: Ready</span>
            </div>
        </nav>

        <div class="container">
            <!-- Dashboard Stats -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="card-title">Total Accounts</h5>
                            <h2 id="total-accounts">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-info">
                        <div class="card-body">
                            <h5 class="card-title">Total Groups</h5>
                            <h2 id="total-groups">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="card-title">Messages Sent</h5>
                            <h2 id="messages-sent">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-danger">
                        <div class="card-body">
                            <h5 class="card-title">Failed</h5>
                            <h2 id="failed-count">0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tab Navigation -->
            <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="api-tab" data-bs-toggle="tab" data-bs-target="#api" type="button">API Setup</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="accounts-tab" data-bs-toggle="tab" data-bs-target="#accounts" type="button">Accounts</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="groups-tab" data-bs-toggle="tab" data-bs-target="#groups" type="button">Groups</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="broadcast-tab" data-bs-toggle="tab" data-bs-target="#broadcast" type="button">Broadcast</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="logs-tab" data-bs-toggle="tab" data-bs-target="#logs" type="button">Logs</button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content" id="mainTabContent">
                <!-- API Setup Tab -->
                <div class="tab-pane fade show active" id="api" role="tabpanel">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5>API Credentials Setup</h5>
                        </div>
                        <div class="card-body">
                            <div class="alert alert-info">
                                <strong>Instructions:</strong> Get your API ID and API HASH from <a href="https://my.telegram.org/apps" target="_blank">https://my.telegram.org/apps</a>
                            </div>
                            <form id="apiForm">
                                <div class="mb-3">
                                    <label for="apiId" class="form-label">API ID</label>
                                    <input type="number" class="form-control" id="apiId" placeholder="e.g., 1234567" required>
                                </div>
                                <div class="mb-3">
                                    <label for="apiHash" class="form-label">API HASH</label>
                                    <input type="text" class="form-control" id="apiHash" placeholder="e.g., abcdef1234567890" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Upload API Credentials</button>
                                <span id="apiStatus" class="ms-3"></span>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Accounts Tab -->
                <div class="tab-pane fade" id="accounts" role="tabpanel">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5>Manage Telegram Accounts</h5>
                        </div>
                        <div class="card-body">
                            <form id="addAccountForm" class="mb-4">
                                <div class="input-group mb-3">
                                    <input type="text" class="form-control" id="phoneNumber" placeholder="+1234567890" required>
                                    <button class="btn btn-primary" type="submit">Add Account</button>
                                </div>
                            </form>

                            <div id="otpModal" style="display: none;" class="mb-4 p-3 border rounded bg-light">
                                <h6>Verify OTP</h6>
                                <div class="input-group mb-3">
                                    <input type="text" class="form-control" id="otpCode" placeholder="Enter OTP code">
                                    <button class="btn btn-success" id="verifyOtpBtn">Verify</button>
                                </div>
                            </div>

                            <div id="accountsList" class="row"></div>
                        </div>
                    </div>
                </div>

                <!-- Groups Tab -->
                <div class="tab-pane fade" id="groups" role="tabpanel">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5>Manage Groups</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <select id="accountSelect" class="form-select">
                                    <option value="">Select Account</option>
                                </select>
                            </div>
                            <button class="btn btn-info" id="refreshGroupsBtn">Refresh Groups</button>
                            <button class="btn btn-secondary" id="selectAllBtn">Select All</button>
                            <button class="btn btn-warning" id="saveGroupsBtn">Save Selected Groups</button>
                            
                            <div class="mt-3">
                                <input type="text" id="searchGroups" class="form-control mb-3" placeholder="Search groups...">
                                <div id="groupsList"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Broadcast Tab -->
                <div class="tab-pane fade" id="broadcast" role="tabpanel">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5>Broadcast Message</h5>
                        </div>
                        <div class="card-body">
                            <form id="broadcastForm">
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" rows="5" placeholder="Enter your message here..." required></textarea>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="delay" class="form-label">Delay (seconds)</label>
                                        <input type="number" class="form-control" id="delay" value="0" min="0">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="repeatInterval" class="form-label">Repeat Interval (seconds)</label>
                                        <input type="number" class="form-control" id="repeatInterval" value="300" min="0">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="randomDelay">
                                        <label class="form-check-label" for="randomDelay">
                                            Random Delay (±50%)
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="autoRepeat">
                                        <label class="form-check-label" for="autoRepeat">
                                            Auto Repeat
                                        </label>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-success btn-lg" id="startBroadcastBtn">Start Broadcast</button>
                                <button type="button" class="btn btn-danger btn-lg" id="stopBroadcastBtn" style="display: none;">Stop Broadcast</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Logs Tab -->
                <div class="tab-pane fade" id="logs" role="tabpanel">
                    <div class="card">
                        <div class="card-header bg-dark text-white">
                            <h5>Activity Logs</h5>
                        </div>
                        <div class="card-body">
                            <button class="btn btn-info" id="exportLogsBtn">Export Logs</button>
                            <button class="btn btn-danger" id="clearLogsBtn">Clear Logs</button>
                            
                            <div id="logsList" class="mt-3" style="max-height: 500px; overflow-y: auto;">
                                <p class="text-muted">Loading logs...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
